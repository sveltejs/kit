name: Generate Types

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run against (optional, defaults to the current branch)'
        required: false
        type: string

permissions:
  contents: write # to push the generated types commit

jobs:
  generate-types:
    # prevents this action from running on forks
    if: github.repository == 'sveltejs/kit'
    runs-on: ubuntu-latest
    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            # Check if the PR is from a fork - we can't push to fork branches
            is_fork=$(gh pr view ${{ inputs.pr_number }} --json isCrossRepository -q .isCrossRepository --repo ${{ github.repository }})
            if [ "$is_fork" = "true" ]; then
              echo "::error::Cannot run this workflow for PRs from forks. The workflow needs to push commits back to the PR branch, which is not possible for fork PRs."
              exit 1
            fi
            branch=$(gh pr view ${{ inputs.pr_number }} --json headRefName -q .headRefName --repo ${{ github.repository }})
            echo "ref=$branch" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
      - uses: pnpm/action-setup@v4.2.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd packages/kit && pnpm generate:types
      - name: Commit generated types
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/kit/types
          git diff --staged --quiet || git commit -m "chore: generate types"
          git push

name: Autofix Lint

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run against (optional, defaults to the main branch)"
        required: false
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: write # to push the generated types commit

jobs:
  generate-types:
    # prevents this action from running on forks
    # for issue_comment: only run when comment is '/autofix' on a PR
    if: |
      github.repository == 'sveltejs/kit' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          github.event.comment.body == '/autofix'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Determine ref
        id: ref
        env:
          PR_NUMBER: ${{ inputs.pr_number || (github.event_name == 'issue_comment' && github.event.issue.number || '') }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            branch=$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName --repo ${{ github.repository }})
            echo "ref=$branch" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
      - uses: pnpm/action-setup@v4.2.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run prettier
        run: pnpm format
      - name: Generate types
        run: cd packages/kit && pnpm generate:types
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: autofix lint"
          git push

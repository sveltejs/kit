name: Autofix Lint

on:
  issue_comment:
    types: [created]

permissions:
  contents: write # to push the generated types commit

jobs:
  generate-types:
    # prevents this action from running on forks
    if: |
      github.repository == 'sveltejs/kit' &&
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/autofix'
    runs-on: ubuntu-latest
    steps:
      - name: Check commenter has write access and get PR ref
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.setFailed(`${context.actor} does not have write access to trigger autofix`);
            }
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pull.head.ref);
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.ref }}
      - uses: pnpm/action-setup@v4.2.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run prettier
        run: pnpm format
      - name: Generate types
        run: cd packages/kit && pnpm generate:types
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: autofix lint"
          git push
